<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0a0e1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>FIFA 2026 Tahmin</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">

  <!-- ══ SPLASH / GİRİŞ EKRANI ══ -->
  <div id="splash-screen" class="splash">
    <div class="splash-bg">
      <div class="splash-orb splash-orb-1"></div>
      <div class="splash-orb splash-orb-2"></div>
      <div class="splash-orb splash-orb-3"></div>
    </div>
    <div class="splash-content">
      <div class="splash-trophy">🏆</div>
      <h1 class="splash-title">FIFA Dünya Kupası</h1>
      <div class="splash-year">2026</div>
      <p class="splash-hosts">🇺🇸 ABD &nbsp;·&nbsp; 🇨🇦 Kanada &nbsp;·&nbsp; 🇲🇽 Meksika</p>
      <p class="splash-sub">11 Haziran – 19 Temmuz 2026 · 48 Takım · 104 Maç</p>

      <div class="splash-card">
        <div class="splash-tabs">
          <button class="stab active" id="stab-login"  onclick="splashTab('login')">Giriş Yap</button>
          <button class="stab"        id="stab-reg"    onclick="splashTab('register')">Kayıt Ol</button>
        </div>
        <div id="splash-form">
          <!-- Giriş formu başlangıçta inline — JS yüklenmeden önce de görünür -->
          <div class="sfield"><label>Kullanıcı Adı</label><input class="sinp" id="su" autocomplete="username" placeholder="kullaniciadi"/></div>
          <div class="sfield"><label>Şifre</label><div class="pw-row"><input class="sinp" id="sp" type="password" autocomplete="current-password" placeholder="••••••"/><button class="pw-eye" onclick="tpw('sp',this)" type="button">👁</button></div></div>
          <p class="serr" id="serr"></p>
          <button class="sbtn" onclick="doSplashLogin()">Giriş Yap →</button>
        </div>
      </div>
      <p class="splash-note">🔒 Şifreler SHA-256 ile şifrelenir · E-posta gerekmez</p>
    </div>
  </div>

  <!-- ══ ANA UYGULAMA ══ -->
  <div id="main-app" style="display:none">

    <header class="header">
      <div class="header-inner">
        <div class="hdr-brand">
          <span class="hdr-logo">🏆</span>
          <div>
            <div class="hdr-title">FIFA 2026</div>
            <div class="hdr-lock" id="hdr-lock">⏳ ...</div>
          </div>
        </div>
        <div class="hdr-right">
          <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">🌙</button>
          <div id="hdr-user-area"></div>
        </div>
      </div>
    </header>

    <div id="step-bar" style="display:none"></div>

    <main class="main" id="main-content"></main>

    <nav class="bottom-nav">
      <button class="tab-btn active" data-tab="predict"     onclick="showTab('predict')">
        <span class="ti">⚽</span><span>Tahmin</span>
      </button>
      <button class="tab-btn"        data-tab="leaderboard" onclick="showTab('leaderboard')">
        <span class="ti">🏅</span><span>Liderlik</span>
      </button>
      <button class="tab-btn"        data-tab="stats"       onclick="showTab('stats')">
        <span class="ti">📊</span><span>İstatistik</span>
      </button>
    </nav>

    <button class="save-fab" onclick="saveAll()" title="Kaydet">💾</button>
  </div>

  <div id="modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box" id="modal-box"></div>
  </div>
  <div id="toast-wrap"></div>
</div>
<script src="script.js"></script>
</body>
</html>
