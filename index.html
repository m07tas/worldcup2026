<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0b0f1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>FIFA 2026 Tahmin</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="hdr-brand">
        <span class="hdr-logo">🏆</span>
        <div>
          <div class="hdr-title">FIFA 2026</div>
          <div class="hdr-sub">Tahmin Platformu</div>
        </div>
      </div>
      <div class="hdr-right">
        <div class="hdr-lock" id="hdr-lock">⏳ ...</div>
        <div class="hdr-user" id="hdr-user"></div>
      </div>
    </div>
  </header>

  <!-- STEP BAR (sadece tahmin sekmesinde görünür) -->
  <div id="step-bar"></div>

  <!-- MAIN CONTENT AREA -->
  <main class="main">
    <div id="main-content"></div>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="tab-btn active" data-tab="predict" onclick="showTab('predict')">
      <span class="ti">⚽</span>
      <span>Tahmin</span>
    </button>
    <button class="tab-btn" data-tab="leaderboard" onclick="showTab('leaderboard')">
      <span class="ti">🏅</span>
      <span>Liderlik</span>
    </button>
    <button class="tab-btn" data-tab="stats" onclick="showTab('stats')">
      <span class="ti">📊</span>
      <span>İstatistik</span>
    </button>
  </nav>

  <!-- TOAST -->
  <div id="toast-wrap"></div>

  <!-- MODAL (fikstür vs.) -->
  <div id="modal"></div>

  <!-- KAYDET BUTONU (sabit, sağ alt) -->
  <button id="save-fab" onclick="saveAll()" title="Kaydet">💾</button>

</div>

<script src="script.js"></script>
</body>
</html>
